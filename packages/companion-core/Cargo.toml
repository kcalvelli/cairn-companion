[package]
name = "companion-core"
version = "0.1.0"
edition = "2021"
description = "axios-companion daemon — persistent session manager and D-Bus control plane"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-journald = "0.3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rusqlite = { version = "0.35", features = ["bundled"] }
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zbus = { version = "5", default-features = false, features = ["tokio"] }
sd-notify = "0.4"
axum = "0.8"
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4"] }
teloxide = { version = "0.13", default-features = false, features = ["macros", "rustls"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tokio-xmpp = "5"
xmpp-parsers = "0.22"
# Direct deps so the xmpp channel can supply its own rustls ClientConfig.
# tokio-xmpp 5.0.0 hardcodes its TLS trust store inside
# `connect/tls_common.rs::establish_tls_connection` with no override hook,
# so we implement our own ServerConnector. See channels/xmpp/connector.rs.
tokio-rustls = { version = "0.26", default-features = false, features = ["aws_lc_rs", "logging", "tls12"] }
sasl = "0.5"
futures = "0.3"
log = "0.4"
# channel-email: IMAP for inbound poll, SMTP for outbound, MIME parsing for
# inbound bodies + thread-root resolution. async-imap brings no TLS of its
# own — we wrap a tokio-rustls TlsStream around its Client::new, reusing
# the same crypto provider the xmpp connector already installs at startup.
async-imap = { version = "0.10", default-features = false, features = ["runtime-tokio"] }
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls-tls", "rustls-tls", "builder", "hostname"] }
mail-parser = { version = "0.11", default-features = false }
# Mozilla's bundled root CA list, used for verifying public mail server
# certificates (Fastmail, Migadu, Posteo, etc). The xmpp connector
# deliberately ships a no-verify config for self-signed Prosody behind
# Tailscale; the email channel ALWAYS goes to a public IMAP/SMTP host,
# so we want the real verifier path.
webpki-roots = "0.26"
# channel-discord: serenity handles the Discord Gateway WebSocket
# (heartbeat, reconnect, session resume) and REST API (send/edit
# messages). client implies gateway+http+model; cache gives us
# Cache::current_user() for the bot's own ID (loop prevention).
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "cache", "model", "builder", "rustls_backend"] }

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
# chrono is transitive via xmpp-parsers but we need a direct path in
# the xmpp adapter's archive-replay tests to construct DateTimes from
# unix timestamps. Test-only — production code goes through
# xmpp-parsers::date::DateTime via .0.timestamp() with no direct chrono
# usage.
chrono = { version = "0.4", default-features = false, features = ["clock"] }
