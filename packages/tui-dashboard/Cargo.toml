[package]
name = "companion-tui"
version = "0.1.0"
edition = "2021"
description = "cairn-companion TUI dashboard — terminal-native monitoring for the companion daemon"

[[bin]]
name = "companion-tui"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
zbus = { version = "5", default-features = false, features = ["tokio"] }
futures-util = "0.3"
