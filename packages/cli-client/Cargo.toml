[package]
name = "companion-cli"
version = "0.1.0"
edition = "2021"
description = "cairn-companion CLI — command-line interface for the companion daemon"

[[bin]]
name = "companion"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
tokio = { version = "1", features = ["full"] }
zbus = { version = "5", default-features = false, features = ["tokio"] }
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"
# doctor: HTTP probes for spokes (/mcp) and the gateway (/health), plus
# JSON for spoke-servers.json parsing and `--json` output. rustls-tls to
# match companion-core and avoid a system OpenSSL dependency.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
